apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: pod-monitor-otel-ds-collector
## namespace where collector pod is running
  namespace: opentelemetry
  labels:
## the below label should matach the release name of kube-prometheus-stack, then only prometheus will discover this podmonitor
    release: my-kube-prometheus-stack
spec:
  namespaceSelector:
## namespace where collector pod is running
    matchNames:
      - opentelemetry
  selector:
    matchLabels:
## the below label should match with otel collector pod's label which is running as daemonsets
      app.kubernetes.io/instance: opentelemetry.otel-collector
      app.kubernetes.io/name: otel-collector-collector
  podMetricsEndpoints:
## the below port name shuld match with pod port name. 
    - port: prometheus
      path: /metrics
      scheme: http
      interval: 15s
      scrapeTimeout: 10s
